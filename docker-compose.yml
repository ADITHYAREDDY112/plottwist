version: "3.9"

services:

  api:
    build: .
    container_name: plottwist-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./engines:/app/engines
      - ./api:/app/api
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: plottwist-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_TMDB_API_KEY=${VITE_TMDB_API_KEY}
      - VITE_YOUTUBE_API_KEY=${VITE_YOUTUBE_API_KEY}
    depends_on:
      - api
    restart: unless-stopped
